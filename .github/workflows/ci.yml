name: Microservice Pipeline

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
    
jobs:
    build-and-test:
        name: Build and Test Stack
        runs-on: ubuntu-latest
    
        steps:
            # checkout repository
            - name: Checkout Code
              uses: actions/checkout@v4
            
            # Set up Docker Buildx (improves caching and build performance)
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            
            
            # create mock .env files required by docker-compose
            - name: Create Mock Environment Files
              run: |
                mkdir -p admin_service user_service audit_service
                touch admin_service/.env
                touch user_service/.env
                touch audit_service/.env
            
            # access the dummy variables passed in the action->variables
            - name: Create .env from GitHub Secrets
              env:
                SECRETS_CONTEXT: ${{ toJson(secrets) }}
              run: |
                # Parse secrets safely into .env format with quoted values
                echo "$SECRETS_CONTEXT" | jq -r '
                  to_entries[] 
                  | select(.key != "GITHUB_TOKEN") 
                  | "\(.key)=\"\(.value | gsub("\""; "\\\"") | gsub("\n"; "\\n"))\""
                ' > .env
                
                # Print structured log confirmation (without leaking secrets)
                echo "=========================================="
                echo "✓ Created .env file from GitHub Secrets"
                echo "Path: $(pwd)/.env"
                echo "Total lines generated: $(wc -l < .env)"
                echo "=========================================="
            
            # create local initialization script required by minio-init service
            - name: Create MinIO Init Script (Dummy if not present)
              run: |
                if [ ! -f init-minio.sh ]; then
                  echo "#!/bin/sh" > init-minio.sh
                  echo "echo 'Initializing MinIO...'" >> init-minio.sh
                  chmod +x init-minio.sh
                fi
            
            # Increase System Virtual Memory for OpenSearch
            - name: Configure Sysctl for OpenSearch
              run: |
                sudo sysctl -w vm.max_map_count=262144

            # Validate Docker Compose File
            - name: Validate Docker Compose Configuration
              run: |
                docker compose config --quiet

            # Build and Start All Services
            - name: Build and Start Microservices
              run: |
                docker compose up -d --build

            # Wait for Health Checks
            - name: Wait for stack Readiness
              run: |
                echo "Waiting for all stack services to start..."
          
                # Retry loop (max 120 seconds)
                TIMEOUT=120
                ELAPSED=0
                # Wait until application services show up in 'running' state
                until docker compose ps --services --filter "status=running" | grep -q "user-service"; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                    echo "Timed out waiting for application services to start."
                    echo "--- Container Status ---"
                    docker compose ps -a
                    echo "--- Stack Logs ---"
                    docker compose logs
                    exit 1
                  fi
                  sleep 5
                  ELAPSED=$((ELAPSED+5))
                  echo "Waiting... (${ELAPSED}s)"
                done
          
                echo "Services are running!"
                docker compose ps

            # Run Django Microservice Tests
            - name: Run Admin Service Tests
              run: |
                docker compose exec -T admin-service python manage.py test --noinput

            - name: Run User Service Tests
              run: |
                docker compose exec -T user-service python manage.py test --noinput

            - name: Run Audit Service Tests
              run: |
                docker compose exec -T audit-service python manage.py test --noinput

            # Clean up Docker Containers
            - name: Tear Down Stack
              if: always()
              run: |
                docker compose down --volumes --remove-orphans
    
    deploy:
        needs: build-and-test
        runs-on: ubuntu-latest
        steps:
            - name: Deploy and Migrate on Live Server
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.SERVER_HOST }}
                username: ${{ secrets.SERVER_USER }}
                key: ${{ secrets.SERVER_SSH_KEY }}
                script: |
                  cd /home/ubuntu/microservice_django
                  git pull origin main
                  docker compose up -d --build
                  
                  # Run migrations automatically after containers start!
                  docker compose exec -T user-service python manage.py migrate --noinput
                  docker compose exec -T admin-service python manage.py migrate --noinput