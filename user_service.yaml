version: '3.8'

volumes:
  user_postgres_data: {}

networks:
  microservice-network:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: shared_redis
    ports:
      - 6379:6379
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - microservice-network
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    container_name: frontend
    ports:
      - "3000:3000"
    restart: always
    networks:
      - microservice-network

  user-postgres:
    image: postgres:16-alpine
    container_name: user_postgres
    restart: always
    environment:
      POSTGRES_DB: user_postgres_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user_postgress_secure_password
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - microservice-network

  user-service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - ./user_service:/app
    ports:
      - 8000:8000
    depends_on:
      redis:
        condition: service_healthy   # Wait until redis-cli ping succeeds
      user-postgres:
        condition: service_started
    env_file:
      - ./user_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379/2
      - ADMIN_MICROSERVICE_URL=http://admin-service:8001
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
      - MINIO_STORAGE_ENDPOINT=minio:9000
      - MINIO_STORAGE_ACCESS_KEY=minioadmin
      - MINIO_STORAGE_SECRET_KEY=minioadmin123
      - MINIO_STORAGE_BUCKET_NAME=django-media
    networks:
      - microservice-network