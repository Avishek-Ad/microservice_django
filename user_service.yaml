version: '3.8'

volumes:
  user_postgres_data: {}
  admin_postgres_data: {}
  minio-data: {}

networks:
  microservice-network:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: shared_redis
    ports:
      - 6379:6379
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - microservice-network

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_SERVER_URL: "http://localhost:9000"
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - microservice-network
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    container_name: frontend
    ports:
      - "3000:3000"
    restart: always
    networks:
      - microservice-network

  user-postgres:
    image: postgres:16-alpine
    container_name: user_postgres
    restart: always
    environment:
      POSTGRES_DB: user_postgres_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user_postgress_secure_password
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - microservice-network

  user-service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - ./user_service:/app
    ports:
      - 8000:8000
    depends_on:
      redis:
        condition: service_healthy   # Wait until redis-cli ping succeeds
      user-postgres:
        condition: service_started
    env_file:
      - ./user_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379/2
      - ADMIN_MICROSERVICE_URL=http://admin-service:8001
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
      - MINIO_STORAGE_ENDPOINT=minio:9000
      - MINIO_STORAGE_ACCESS_KEY=minioadmin
      - MINIO_STORAGE_SECRET_KEY=minioadmin123
      - MINIO_STORAGE_BUCKET_NAME=user-media
      - MEDIA_URL_PREFIX=localhost:9000/media
    networks:
      - microservice-network
  
  admin-postgres:
    image: postgres:16-alpine
    container_name: admin_postgres
    restart: always
    environment:
      POSTGRES_DB: admin_postgres_db   
      POSTGRES_USER: admin      
      POSTGRES_PASSWORD: admin_postgress_secure_password
    ports:
      - "5433:5432"
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - microservice-network
  
  admin-service:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./admin_service:/app
    ports:
      - 8001:8001
    depends_on:
      - admin-postgres
    env_file:
      - ./admin_service/.env
    networks:
      - microservice-network