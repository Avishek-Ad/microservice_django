version: '3.8'

services:
  user-postgres:
    image: postgres:16-alpine
    container_name: user_postgres
    restart: always
    environment:
      POSTGRES_DB: user_postgres_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user_postgress_secure_password
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - microservice-network

  user-service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./user_service:/app
    ports:
      - 8000:8000
    depends_on:
      - user-postgres
    env_file:
      - ./user_service/.env
    environment:
      - ADMIN_MICROSERVICE_URL=http://admin-service:8001
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    networks:
      - microservice-network

volumes:
  user_postgres_data: {}

networks:
  microservice-network:
    driver: bridge
