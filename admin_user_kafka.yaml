version: '3.8'

networks:
  microservice-network:
    driver: bridge
  
volumes:
  admin_postgres_data: {}
  user_postgres_data: {}
  mongo_data: {}

services:
  # =======================================================
  # SHARED INFRASTRUCTURE (shared across all services)
  # =======================================================
  redis:
    image: redis:7-alpine
    container_name: shared_redis
    ports:
      - 6379:6379
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - microservice-network
  
  kafka:
    image: bitnami/kafka:3.7-debian-12
    container_name: shared_kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      # KRaft Settings (ZooKeeper-less)
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # Listeners configuration
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # Allow topics to auto-create during development/production initialization
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      # Verifies Kafka is fully listening and accepting socket metadata handshakes
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - microservice-network

  # =======================================================
  # ADMIN SERVICE MICROSTACK
  # =======================================================
  admin-postgres:
    image: postgres:16-alpine
    container_name: admin_postgres
    restart: always
    environment:
      POSTGRES_DB: admin_postgres_db   
      POSTGRES_USER: admin      
      POSTGRES_PASSWORD: admin_postgress_secure_password
    ports:
      - "5433:5433"
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - microservice-network
  
  admin-service:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./admin_service:/app
    ports:
      - 8001:8001
    depends_on:
      - admin-postgres
    env_file:
      - ./admin_service/.env
    environment:
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    networks:
      - microservice-network

  admin-worker:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_worker
    command: python manage.py kafka_consumer
    volumes:
      - ./admin_service:/app
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - ./admin_service/.env
    environment:
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    networks:
      - microservice-network
  
  admin-celery-worker:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_celery_worker
    command: celery -A core worker -l info
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./admin_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    restart: always
    profiles:
      - celery
    networks:
      - microservice-network
  
  admin-celery-beats:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_celery_beat
    command: celery -A core beat -l info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./admin_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    restart: always
    profiles:
      - celery
    networks:
      - microservice-network
  
  # =======================================================
  # USER SERVICE MICROSTACK
  # =======================================================
  user-postgres:
    image: postgres:16-alpine
    container_name: user_postgres
    restart: always
    environment:
      POSTGRES_DB: user_postgres_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user_postgress_secure_password
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - microservice-network

  user-service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./user_service:/app
    ports:
      - 8000:8000
    depends_on:
      - user-postgres
    env_file:
      - ./user_service/.env
    environment:
      - ADMIN_MICROSERVICE_URL=http://admin-service:8001
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    networks:
      - microservice-network

  user-worker:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app_worker
    command: sh -c "python manage.py init_opensearch && python manage.py kafka_consumer"
    volumes:
      - ./user_service:/app
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./user_service/.env
    environment:
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    networks:
      - microservice-network
  
  user-celery-worker:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app_celery_worker
    command: celery -A core worker -l info
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./user_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    restart: always
    profiles:
      - celery
    networks:
      - microservice-network
  
  user-celery-beats:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app_celery_beats
    command: celery -A core beat -l info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./user_service/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    restart: always
    profiles:
      - celery
    networks:
      - microservice-network
