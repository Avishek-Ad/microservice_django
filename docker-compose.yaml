version: '3.8'

networks:
  microservice-network:
    driver: bridge
  
volumes:
  admin_postgres_data: {}
  user_postgres_data: {}
  opensearch-data:
    driver: local
  mongo_data: {}
  kafka_data: {}
  minio-data: {}

services:
  # =======================================================
  # API GATEWAY (The Only Public Entry Point)
  # =======================================================
  api_gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: api_gateway
    ports:
      - "80:80"
      - "443:443"
      - "9001:9001"   # MinIO Console UI
      - "8080:8080"   # Kafka UI
      - "5601:5601"   # OpenSearch Dashboards
      - "8081:8081"   # Mongo Express
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - user-service
      - admin-service
      - audit-service
      - minio
      - kafka-ui
      - opensearch-dashboards
      - mongo-express
      - frontend
    restart: always
    networks:
      - microservice-network
  
  # =======================================================
  # FRONTEND
  # =======================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
    container_name: frontend
    # ports:
    #   - "3000:3000"
    expose:
      - "3000"
    restart: always
    networks:
      - microservice-network
  
  # =======================================================
  # SHARED INFRASTRUCTURE (shared across all services)
  # =======================================================
  redis:
    image: redis:7-alpine
    container_name: shared_redis
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - microservice-network
  
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-local
    expose:
      - "9092"
    environment:
      # --- ADD OR UPDATE THESE PROPERTIES ---
      KAFKA_BROKER_MAX_NODE_TO_CONTROLLER_REQUEST_TIMEOUT_MS: 15000
      KAFKA_REQUEST_TIMEOUT_MS: 15000
      KAFKA_CONNECTION_MAX_IDLE_MS: 30000
      # If using KRaft mode explicitly, ensure these are generous:
      KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS: 15000
      KAFKA_CONTROLLER_QUORUM_ELECTION_TIMEOUT_MS: 15000
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
      # Enable KRaft mode (no ZooKeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      
      # Configure listeners for both inside Docker and your local host machine
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      
      # Automatically create topics if they don't exist yet
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      
      # Required cluster ID for KRaft mode
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      
      # Speed up message handling for local development
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      # Verifies Kafka is fully listening and accepting socket metadata handshakes
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    networks:
      - microservice-network
  
  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: kafka-ui
    expose:
      - "8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: always
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: 'local-kraft-cluster'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:29092'
    networks:
      - microservice-network

  opensearch-node:
    image: opensearchproject/opensearch:2.14.0
    container_name: opensearch-node
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node         
      - bootstrap.memory_lock=true         
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m" # allow initial and max storage of 1G
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true  
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    expose:
      - "9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9200/_cluster/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
    restart: always
    networks:
      - microservice-network
  
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.14.0
    container_name: opensearch-dashboards
    expose:
      - "5601" # UI port accessible at http://localhost:5601
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch-node:9200"]
      - DISABLE_SECURITY_PLUGIN=true                     # Must match the node security setting
    depends_on:
      opensearch-node:
        condition: service_healthy
    restart: always
    networks:
      - microservice-network

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_SERVER_URL: ${MINIO_SERVER_URL}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - microservice-network
  
  # =======================================================
  # ADMIN SERVICE MICROSTACK
  # =======================================================
  admin-postgres:
    image: postgres:16-alpine
    container_name: admin_postgres
    restart: always
    environment:
      POSTGRES_DB: ${ADMIN_POSTGRES_DB}   
      POSTGRES_USER: ${ADMIN_POSTGRES_USER}      
      POSTGRES_PASSWORD: ${ADMIN_POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - microservice-network
  
  admin-service:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8001 --workers 1 --timeout 120"
    expose:
      - "8001"
    depends_on:
      - admin-postgres
    env_file:
      - ./admin_service/.env
    environment:
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
    restart: always
    networks:
      - microservice-network

  admin-worker:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_worker
    command: python manage.py kafka_consumer
    depends_on:
      admin-postgres:
        condition: service_started
      kafka:
        condition: service_healthy
    env_file:
      - ./admin_service/.env
    environment:
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
    restart: always
    networks:
      - microservice-network
  
  admin-celery-worker:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_celery_worker
    command: celery -A core worker --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./admin_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379/0
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
    restart: always
    networks:
      - microservice-network
  
  admin-celery-beats:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_celery_beat
    command: celery -A core beat -l info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./admin_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379/0
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
    restart: always
    networks:
      - microservice-network
  
  # =======================================================
  # USER SERVICE MICROSTACK
  # =======================================================
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./init-minio.sh:/init-minio.sh
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      BUCKET_NAME: ${BUCKET_NAME}
    restart: always
    networks:
      - microservice-network

  user-postgres:
    image: postgres:16-alpine
    container_name: user_postgres
    restart: always
    environment:
      POSTGRES_DB: ${USER_POSTGRES_DB}
      POSTGRES_USER: ${USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER:-user} -d ${USER_POSTGRES_DB:-user_postgres_db}"]
      interval: 3s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - microservice-network

  user-service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy   # Wait until redis-cli ping succeeds
      user-postgres:
        condition: service_healthy
    env_file:
      - ./user_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379/2
      - ADMIN_MICROSERVICE_URL=http://admin-service:8001
      - OPENSEARCH_URL=http://opensearch-node:9200
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
      - MINIO_STORAGE_ENDPOINT=minio:9000
      - MINIO_STORAGE_ACCESS_KEY=${MINIO_STORAGE_ACCESS_KEY}
      - MINIO_STORAGE_SECRET_KEY=${MINIO_STORAGE_SECRET_KEY}
      - MINIO_STORAGE_BUCKET_NAME=${MINIO_STORAGE_BUCKET_NAME}
      - MEDIA_URL_PREFIX=${MEDIA_URL_PREFIX}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT}
    restart: always
    networks:
      - microservice-network

  user-worker:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app_worker
    command: sh -c "python manage.py init_opensearch && python manage.py kafka_consumer"
    depends_on:
      user-postgres:
        condition: service_started
      opensearch-node:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./user_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379/2
      - OPENSEARCH_URL=http://opensearch-node:9200
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
    restart: always
    networks:
      - microservice-network
  
  user-celery-worker:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app_celery_worker
    command: celery -A core worker --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./user_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379/1
      - OPENSEARCH_URL=http://opensearch-node:9200
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
    restart: always
    networks:
      - microservice-network
  
  user-celery-beats:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app_celery_beats
    command: celery -A core beat -l info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./user_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379/1
      - OPENSEARCH_URL=http://opensearch-node:9200
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
    restart: always
    networks:
      - microservice-network

# =======================================================
# AUDIT SERVICE MICROSTACK
# =======================================================
  audit-mongodb:
    image: mongo:4.4
    container_name: mongodb_container
    restart: always
    ports:
      - "27017:27017" 
    environment:
      # old env variable name for mongo-4.4
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - microservice-network
  
  audit-service:
    build:
      context: ./audit_service
      dockerfile: Dockerfile
    container_name: audit_app
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8002 --workers 1 --timeout 120
    expose:
      - "8002"
    depends_on:
      audit-mongodb:
        condition: service_healthy
    env_file:
      - ./audit_service/.env
    environment:
      - MONGODB_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@audit-mongodb:27017/
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
    restart: always
    networks:
      - microservice-network
    
  audit-worker:
    build:
      context: ./audit_service
      dockerfile: Dockerfile
    container_name: audit_app_worker
    command: python manage.py kafka_consumer
    env_file:
      - ./audit_service/.env
    environment:
      - MONGODB_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@audit-mongodb:27017/
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
    depends_on:
      - audit-mongodb
      - kafka
    restart: always
    networks:
      - microservice-network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_container
    restart: always
    expose:
      - "3000:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@audit-mongodb:27017/
      - ME_CONFIG_MONGODB_SERVER=audit-mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      
      # This turns off the web pop-up screen login
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      audit-mongodb:
        condition: service_healthy
    networks:
      - microservice-network