version: '3.8'
services:
  redis: # remove use kafka
    image: redis:7-alpine
    container_name: microservice_redis
    ports:
      - 6379:6379
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  admin-service:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./admin_service:/app
    ports:
      - 8001:8001
    depends_on:
      - redis
      - admin-postgres
    env_file:
      - ./admin_service/.env

  admin-postgres:
    image: postgres:16-alpine
    container_name: admin_postgres
    restart: always
    environment:
      POSTGRES_DB: admin_postgres_db   
      POSTGRES_USER: admin      
      POSTGRES_PASSWORD: admin_postgress_secure_password
    ports:
      - "5433:5433"
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data

  # add redis for admin's celerybeats (use a centralized redis)

  admin-worker: # change to celerybeats
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_worker
    command: python manage.py listen_applications
    volumes:
      - ./admin_service:/app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./admin_service/.env
  
  user-service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./user_service:/app
    ports:
      - 8000:8000
    depends_on:
      - redis
      - user-postgres
    env_file:
      - ./user_service/.env
    environment:
      - ADMIN_MICROSERVICE_URL=http://admin-service:8001

  user-postgres:
    image: postgres:16-alpine
    container_name: user_postgres
    restart: always
    environment:
      POSTGRES_DB: user_postgres_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: admin_postgress_secure_password
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  user-worker: # change to celerybeats
    build:
      context: ./user_service
      dockerfile: Dockerfile
    container_name: user_app_worker
    command: python manage.py listen_status_update
    volumes:
      - ./user_service:/app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./user_service/.env

volumes:
  admin_postgres_data:
  user_postgres_data: