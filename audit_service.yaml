version: '3.8'

services:  
  audit-mongodb:
    image: mongo:4.4
    container_name: mongodb_container
    restart: always
    ports:
      - "27017:27017" 
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=securepassword123
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - microservice-network
  
  audit-service:
    build:
      context: ./audit_service
      dockerfile: Dockerfile
    container_name: audit_app
    command: python manage.py runserver 0.0.0.0:8002
    volumes:
      - ./audit_service:/app
    ports:
      - 8002:8002
    depends_on:
      audit-mongodb:
        condition: service_healthy
    env_file:
      - ./audit_service/.env
    environment:
      - MONGODB_URL=mongodb://root:securepassword123@audit-mongodb:27017/
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
    networks:
      - microservice-network
  
  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_container
    restart: always
    ports:
      - "8081:8081"
    environment:
      # Fix 2: Move these variables HERE where Mongo Express can actually read them
      - ME_CONFIG_MONGODB_URL=mongodb://root:securepassword123@audit-mongodb:27017/
      - ME_CONFIG_MONGODB_SERVER=audit-mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root
      - ME_CONFIG_MONGODB_ADMINPASSWORD=securepassword123
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      
      # This turns off the web pop-up screen login
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      audit-mongodb:
        condition: service_healthy
    networks:
      - microservice-network

volumes:
  mongo_data: {}

networks:
  microservice-network:
    driver: bridge