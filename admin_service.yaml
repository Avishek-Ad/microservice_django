version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: shared_redis
    ports:
      - 6379:6379
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - microservice-network
  
  admin-postgres:
    image: postgres:16-alpine
    container_name: admin_postgres
    restart: always
    environment:
      POSTGRES_DB: admin_postgres_db   
      POSTGRES_USER: admin      
      POSTGRES_PASSWORD: admin_postgress_secure_password
    ports:
      - "5433:5433"
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - microservice-network
  
  admin-service:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./admin_service:/app
    ports:
      - 8001:8001
    depends_on:
      - admin-postgres
    env_file:
      - ./admin_service/.env
    networks:
      - microservice-network

  admin-worker:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_worker
    command: python manage.py kafka_consumer
    volumes:
      - ./admin_service:/app
    env_file:
      - ./admin_service/.env
    networks:
      - microservice-network
  
  admin-celery-worker:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_celery_worker
    command: celery -A core worker -l info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./admin_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379
    restart: always
    profiles:
      - celery
    networks:
      - microservice-network
  
  admin-celery-beats:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_app_celery_beat
    command: celery -A core beat -l info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./admin_service/.env
    environment:
      - REDIS_URL=redis://shared_redis:6379
    restart: always
    networks:
      - microservice-network

volumes:
  admin_postgres_data: {}

networks:
  microservice-network:
    driver: bridge